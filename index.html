<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>LuFlix</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <h1>🎬 LuFlix Client</h1>

    <section>
      <h2>Cadastro de Usuário</h2>

      <input id="name" placeholder="Nome" />
      <input id="email" placeholder="Email" />
      <input id="password" placeholder="Senha" />

      <button onclick="registerUser()">Cadastrar</button>
    </section>

    <section>
      <h2>Assinar Plano</h2>

      <input id="subUserId" placeholder="User ID" />
      <input id="planId" placeholder="Plano" />
      <input id="cpf" placeholder="CPF" />

      <button onclick="subscribe()">Assinar</button>
    </section>

    <section>
      <h2>Cadastrar Diretor</h2>

      <input id="directorFirstName" placeholder="Nome" />
      <input id="directorLastName" placeholder="Sobrenome" />
      <input id="nacionalidade" placeholder="Nacionalidade" />
      <input type="date" id="birth" placeholder="Nascimento" />

      <button onclick="createDirector()">Salvar Diretor</button>
    </section>

    <section>
      <h2>Cadastrar Atores</h2>

      <input id="actorFirstName" placeholder="Nome" />
      <input id="actorLastName" placeholder="Sobrenome" />
      <input id="actorNacionalidade" placeholder="Nacionalidade" />
      <input id="actorBirth" placeholder="nascimento" type="date" />

      <button onclick="createActors()">Salvar Atores</button>
    </section>

    <section>
      <h2>Cadastrar Filme</h2>

      <input id="filmeTitulo" placeholder="Título" />
      <input id="filmeAno" placeholder="Ano" type="number" />
      <textarea id="filmeSinopse" placeholder="Sinopse"></textarea>
      <input id="filmeDuracao" placeholder="duração(min)" type="number" />
      <input id="filmeRating" placeholder="Avaliação" type="number" />
      <input
        id="filmeNumberRating"
        placeholder="Número de Avaliações"
        type="number"
      />
      <textarea
        placeholder="Diretores (um id por linha)"
        id="filmeDiretores"
      ></textarea>
      <input
        id="filmeClassificacao"
        placeholder="Classificação Indicativa (id)"
        type="number"
      />

      <button onclick="createMovie()">Salvar Filme</button>
    </section>

    <section>
      <h2>Cadastrar Série</h2>

      <input id="serieTitulo" placeholder="Título" />
      <textarea id="serieSinopse" placeholder="Sinopse"></textarea>
      <input
        id="serieClassificacao"
        placeholder="Classificação Indicativa (id)"
        type="number"
      />
      <input type="number" id="serieAno" placeholder="Ano de Publicação" />

      <button onclick="createSerie()">Salvar Série</button>
    </section>

    <section>
      <h2>Cadastrar Episódio</h2>

      <input type="number" placeholder="Ano de lançamento" id="episodeAno" />
      <input
        type="number"
        placeholder="Classificação Indicativa (id)"
        id="episodeClassificacao"
      />
      <textarea
        id="episodeDirectors"
        placeholder="Diretores (um ID por linha)"
      ></textarea>
      <input type="number" placeholder="Duração" id="episodeDuracao" />
      <input type="text" placeholder="Título" id="episodeTitulo" />
      <textarea id="episodeSinopse" placeholder="Sinopse"></textarea>
      <input
        type="number"
        placeholder="Número da temporada"
        id="episodeSeasonNumber"
      />
      <input
        type="number"
        placeholder="ID da série (Se a série já existir)"
        id="episodeSerieId"
      />

      <button onclick="createEpisode()">Salvar Episódio</button>
    </section>

    <section>
      <h2>Adicionar Gênero</h2>

      <button onclick="addGenre()">Vincular</button>
    </section>

    <section>
      <h2>Adicionar Elenco</h2>

      <button onclick="addCast()">Vincular</button>
    </section>

    <section>
      <h2>Adicionar Diretor ao Conteúdo</h2>

      <button onclick="addDirectorContent()">Vincular</button>
    </section>

    <section>
      <h2>Avaliação</h2>

      <button onclick="reviewMovie()">Enviar Review</button>
    </section>

    <section>
      <h2>Favoritos</h2>

      <button onclick="addFavorite()">Adicionar</button>

      <button onclick="removeFavorite()">Remover</button>
    </section>

    <section>
      <h2>Histórico</h2>

      <button onclick="saveHistory()">Salvar Histórico</button>
    </section>

    <section>
      <h2>Consultas</h2>

      <button onclick="loadMovies()">Filmes</button>

      <button onclick="loadSeries()">Séries</button>

      <button onclick="loadSeasons()">Temporadas</button>
    </section>

    <div id="resultado"></div>

    <script src="js/app.js"></script>
  </body>
</html>
